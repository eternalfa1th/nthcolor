<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280" />
  <title>가히의 공부 대시보드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>

<!-- LOCK LAYER -->
<div class="lock-layer" id="lockLayer">
  <div class="lock-content">
    <div class="lock-ring">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <rect x="3" y="11" width="18" height="11" rx="3"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <p class="lock-title">집중 모드 활성화</p>
    <p class="lock-timer" id="lockTimer">00:00:00</p>
    <p class="lock-sub">화이팅! 잘 하고 있어요 ✦</p>
    <button class="lock-stop-btn" id="lockStopBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
      공부 중단
    </button>
  </div>
</div>

<!-- APP WRAPPER -->
<div class="app-wrapper">

  <!-- ══ LEFT COLUMN ══ -->
  <div class="col col-left">

    <!-- TODO PANEL 63% -->
    <div class="panel todo-panel">
      <div class="panel-header">
        <div class="date-nav">
          <button class="icon-btn" id="prevDay">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <span class="date-display" id="dateDisplay"></span>
          <button class="icon-btn" id="nextDay">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
        <div class="tab-row">
          <button class="tab-btn active" data-tab="study">공부 계획</button>
          <button class="tab-btn" data-tab="mental">정신 관리</button>
        </div>
      </div>

      <div class="tab-content active" id="tab-study">
        <div class="subjects-scroll">
          <div id="subjectsList"></div>
        </div>
      </div>

      <div class="tab-content" id="tab-mental">
        <div class="subjects-scroll">
          <div id="mentalList"></div>
        </div>
      </div>
    </div>

    <!-- WEEKLY RECORD 37% -->
    <div class="panel weekly-panel">
      <div class="panel-title-bar">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        주간 생활 기록
      </div>
      <div class="habits-container" id="habitsGrid"></div>
    </div>

  </div>

  <!-- ══ CENTER COLUMN ══ -->
  <div class="col col-center">

    <!-- CHARACTER PANEL 36% -->
    <div class="panel char-panel">
      <div class="char-left">
        <div class="char-img-wrap" id="charImgWrap">
          <img src="/gahi.png" alt="가히" class="char-img" id="charImg" />
          <label class="char-upload-overlay" for="charFileInput">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <span>사진 변경</span>
          </label>
          <input type="file" accept="image/*" id="charFileInput" style="display:none" />
        </div>
        <div class="char-name-tag">가히</div>
      </div>
      <div class="char-right">
        <div class="stat-row">
          <span class="stat-lv-label">Lv. <strong id="charLevel">1</strong></span>
          <div class="exp-bar">
            <div class="exp-fill" id="expFill" style="width:0%"></div>
          </div>
          <span class="exp-text" id="expText">0 / 100</span>
        </div>
        <div class="stat-row cond-row">
          <span class="cond-label">컨디션</span>
          <div class="cond-pills" id="condPills">
            <button class="cond-pill active" data-c="최상">최상</button>
            <button class="cond-pill" data-c="좋음">좋음</button>
            <button class="cond-pill" data-c="보통">보통</button>
            <button class="cond-pill" data-c="나쁨">나쁨</button>
          </div>
        </div>
        <div class="char-btns">
          <button class="action-btn primary-btn" id="studyBtn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            공부 시작
          </button>
          <button class="action-btn secondary-btn" id="mealBtn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
            식사하기
          </button>
        </div>
        <div class="timers-wrap">
          <div class="timer-card">
            <div class="timer-icon"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
            <div class="timer-label">공부 시간</div>
            <div class="timer-val" id="studyTimerDisplay">00:00:00</div>
          </div>
          <div class="timer-card">
            <div class="timer-icon"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg></div>
            <div class="timer-label">오늘 식사</div>
            <div class="timer-val" id="mealCountDisplay">0회</div>
          </div>
        </div>
      </div>
    </div>

    <!-- QUEST PANEL 64% -->
    <div class="panel quest-panel">
      <div class="panel-title-bar">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        주간 퀘스트
      </div>
      <div class="quest-scroll">
        <div id="questsList"></div>
      </div>
    </div>

  </div>

  <!-- ══ RIGHT COLUMN ══ -->
  <div class="col col-right">

    <!-- ABILITY PANEL 47% -->
    <div class="panel ability-panel">
      <div class="panel-header">
        <div class="panel-title-bar no-mb">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          능력치
        </div>
        <div class="tab-row">
          <button class="tab-btn active" data-atab="study">공부 능력치</button>
          <button class="tab-btn" data-atab="mental">정신 능력치</button>
        </div>
      </div>
      <div class="ability-scroll">
        <div id="abilityStudy" class="ability-section"></div>
        <div id="abilityMental" class="ability-section hidden"></div>
      </div>
    </div>

    <!-- SMARTPHONE WIDGET -->
    <div class="phone-widget" id="phoneWidget">
      <div class="phone-handle" id="phoneHandle">
        <div class="handle-grip"></div>
        <div class="handle-row">
          <span class="handle-title">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            메시지
          </span>
          <div class="handle-badges" id="handleBadges"></div>
        </div>
      </div>

      <div class="phone-body" id="phoneBody">
        <!-- CHAT LIST -->
        <div id="chatListView">
          <div class="chat-item" data-room="aori">
            <img class="chat-avatar" src="/aori.jpeg" alt="아오리" />
            <div class="chat-info">
              <div class="chat-name">아오리</div>
              <div class="chat-preview" id="preview-aori">안녕! 오늘 공부는 잘 돼?</div>
            </div>
            <div class="chat-right">
              <span class="chat-time">방금</span>
              <span class="chat-dot" id="dot-aori">1</span>
            </div>
          </div>
          <div class="chat-item" data-room="hotaru">
            <img class="chat-avatar" src="/hotaru.jpeg" alt="호타루" />
            <div class="chat-info">
              <div class="chat-name">호타루</div>
              <div class="chat-preview" id="preview-hotaru">오늘도 화이팅이야~</div>
            </div>
            <div class="chat-right">
              <span class="chat-time">1분 전</span>
              <span class="chat-dot" id="dot-hotaru">1</span>
            </div>
          </div>
          <div class="chat-item" data-room="system">
            <div class="chat-avatar sys-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
            </div>
            <div class="chat-info">
              <div class="chat-name">시스템</div>
              <div class="chat-preview">알림 설정을 확인하세요.</div>
            </div>
            <div class="chat-right">
              <span class="chat-time">알림</span>
              <span class="chat-dot" id="dot-system">1</span>
            </div>
          </div>
        </div>

        <!-- ROOM: AORI -->
        <div class="chat-room hidden" id="room-aori">
          <div class="room-header">
            <button class="back-btn room-back"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
            <img class="room-ava" src="/aori.jpeg" alt="아오리" />
            <span class="room-name">아오리</span>
          </div>
          <div class="room-msgs" id="msgs-aori">
            <div class="msg recv">
              <img class="msg-ava" src="/aori.jpeg" alt="아오리" />
              <div class="bubble">안녕! 오늘 공부는 잘 돼?</div>
            </div>
          </div>
          <div class="room-choices" id="choices-aori">
            <button class="choice-btn" data-room="aori" data-reply="응, 열심히 하고 있어!">응, 열심히 하고 있어!</button>
            <button class="choice-btn" data-room="aori" data-reply="조금 힘들지만 버티는 중...">조금 힘들지만 버티는 중...</button>
            <button class="choice-btn" data-room="aori" data-reply="잠깐 쉬고 다시 시작할게!">잠깐 쉬고 다시 시작할게!</button>
          </div>
        </div>

        <!-- ROOM: HOTARU -->
        <div class="chat-room hidden" id="room-hotaru">
          <div class="room-header">
            <button class="back-btn room-back"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
            <img class="room-ava" src="/hotaru.jpeg" alt="호타루" />
            <span class="room-name">호타루</span>
          </div>
          <div class="room-msgs" id="msgs-hotaru">
            <div class="msg recv">
              <img class="msg-ava" src="/hotaru.jpeg" alt="호타루" />
              <div class="bubble">오늘도 화이팅이야~</div>
            </div>
          </div>
          <div class="room-choices" id="choices-hotaru">
            <button class="choice-btn" data-room="hotaru" data-reply="고마워! 덕분에 힘이 나!">고마워! 덕분에 힘이 나!</button>
            <button class="choice-btn" data-room="hotaru" data-reply="오늘은 좀 쉬고 싶어...">오늘은 좀 쉬고 싶어...</button>
            <button class="choice-btn" data-room="hotaru" data-reply="같이 공부할 수 있으면 좋겠다!">같이 공부할 수 있으면 좋겠다!</button>
          </div>
        </div>

        <!-- ROOM: SYSTEM -->
        <div class="chat-room hidden" id="room-system">
          <div class="room-header">
            <button class="back-btn room-back"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
            <div class="room-ava sys-icon-sm">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
            </div>
            <span class="room-name">시스템</span>
          </div>
          <div class="room-msgs" id="msgs-system">
            <div class="msg recv sys-recv">
              <div class="bubble">알림을 설정해 주세요.</div>
            </div>
          </div>
          <div class="alarm-form">
            <div class="alarm-section-title">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
              알림 설정
            </div>
            <label class="alarm-field">
              <span>공부 시작</span>
              <input type="time" id="alarmStudy" value="09:00" />
            </label>
            <label class="alarm-field">
              <span>식사 알림</span>
              <input type="time" id="alarmMeal" value="12:00" />
            </label>
            <label class="alarm-field">
              <span>취침 알림</span>
              <input type="time" id="alarmSleep" value="23:00" />
            </label>
            <div class="alarm-toggle-row">
              <span>알림 활성화</span>
              <label class="toggle">
                <input type="checkbox" id="alarmEnabled" />
                <span class="tog-track"><span class="tog-thumb"></span></span>
              </label>
            </div>
            <button class="alarm-save-btn" id="alarmSave">저장하기</button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script type="module" src="/src/app.js"></script>
</body>
</html>
